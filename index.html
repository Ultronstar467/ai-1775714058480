```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern FastAPI Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="container">
            <h1><a href="/">🔢 FastAPI Calculator</a></h1>
        </div>
    </header>

    <main class="main-content">
        <section class="calculator-section container">
            <h2>Perform Basic Calculations</h2>
            <div class="calculator-card">
                <div class="input-group">
                    <label for="num1">Number 1:</label>
                    <input type="number" id="num1" value="10" placeholder="Enter first number">
                </div>
                <div class="input-group">
                    <label for="operator">Operator:</label>
                    <select id="operator">
                        <option value="+">+</option>
                        <option value="-">-</option>
                        <option value="*">*</option>
                        <option value="/">/</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="num2">Number 2:</label>
                    <input type="number" id="num2" value="5" placeholder="Enter second number">
                </div>
                <button id="calculateBtn">Calculate</button>
                <p class="result-display" id="result">Result: <span id="resultValue"></span></p>
                <p class="error-display" id="error"></p>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2023 FastAPI Calculator. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
